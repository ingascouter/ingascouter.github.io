<header>
    <nav id="autohide">
        <div class="navbar">
            <div class="nav-left">
                <input type="checkbox" id="mobile-menu-toggle">
                <label for="mobile-menu-toggle" class="hamburger" aria-label="Toggle menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
                <a href="/" title="Hem" class="logo" aria-label="Home">
                    <img draggable="false" height="40" width="40"
                        src="https://ingascouter.github.io/assets/icons/logo.png" alt="Logo">
                </a>
                <ul class="nav-links">
                    {% for item in site.data.nav %}
                    {% if item.dropdown %}
                    <li class="dropdown">
                        <input type="radio" id="dropdown{{ forloop.index }}" name="dropdown">
                        <label title="{{ item.title }}" for="dropdown{{ forloop.index }}" class="dd-btn">
                            {{ item.title }}
                        </label>
                        <ul class="dropdown-content">
                            <div>
                                {% for link in item.dropdown %}
                                <li><a href="{{ link.url }}" title="{{ link.title }}">{{ link.title }}</a></li>
                                {% endfor %}
                            </div>
                        </ul>
                    </li>
                    {% else %}
                    <li class="desk-hide">
                        <a href="{{ item.url }}" title="{{ item.title }}">{{ item.title }}</a>
                    </li>
                    {% endif %}
                    {% endfor %}
                </ul>
            </div>
            <ul class="nav-right">
                <li id="webshop" class="mobile-hide"><a href="https://www.heydreamshop.com/ingascouter"
                        onclick="webshopCode()" target="_blank" rel="noopener noreferrer" title="Webshop"><i
                            class="fa-solid fa-cart-shopping"></i></a></li>
                <li id="kuksa" class="mobile-hide"><a title="Kuksa" href="https://kuksa.partio.fi" target="_blank"
                        rel="noopener noreferrer"><img height="40" width="40" alt="Kuksa Logo"
                            src="https://ingascouter.github.io/assets/icons/kuksa_logo.png"></a></li>
                <li style="display: none;" id="theme-toggle">
                    <button title="Växla tema" onclick="toggleDarkMode()"><i
                            class="fa-solid fa-circle-half-stroke"></i></button>
                </li>
            </ul>
            <div class="maintinance">
                <p>Vi bygger ännu på sidan så lita inte på något du läser för tillfället!</p>
            </div>
        </div>
    </nav>
</header>
