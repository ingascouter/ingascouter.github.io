<!DOCTYPE html>
<html lang="sv" style="color-scheme: light dark;">

<head>
    {% include head.html %}
</head>

<body>
    {% include header.html %}
    <main>
        <img class="banner fade" draggable="false" src="{{ page.banner }}" alt="Banner">
        <article>
            <h1>
                {{ page.title }}
            </h1>
            <p>{{ page.description }}</p>
            {{ content }}
            <time class="updated" datetime="{{ page.date | date: '%m-%d-%Y' }}">{{ page.date | date: "%-d %B %Y"}}
        </article>
        </time>
    </main>
    {% include footer.html %}
</body>

</html>
